deployment:
  replicas:
    min: 2
    max: 5

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

container:
  image:
    disallowLatest: true

  resources:
    required: true
    requests:
      cpu:
        min: "100m"
        max: "500m"
      memory:
        min: "64Mi"
        max: "256Mi"

  probes:
    liveness:
      required: true
      initialDelaySeconds:
        min: 5
        max: 30
      periodSeconds:
        max: 20

    readiness:
      required: true
      initialDelaySeconds:
        min: 2
        max: 15

  ports:
    required: true
    allowed:
      - 80
      - 8080
