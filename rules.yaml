deployment:
  replicas:
    min: 1
    max: 5

  strategy:
    allowedTypes:
      - RollingUpdate
    rollingUpdate:
      maxUnavailable:
        max: 1
      maxSurge:
        max: 2

  containers:
    image:
      allowedRegistries:
        - docker.io
        - mycompany.com
      disallowedTags:
        - latest

    ports:
      required: true
      allowedRange:
        min: 1
        max: 65535

    resources:
      required: true
      requests:
        cpu:
          min: "100m"
          max: "500m"
        memory:
          min: "64Mi"
          max: "512Mi"
      limits:
        cpu:
          max: "1"
        memory:
          max: "1Gi"

    probes:
      liveness:
        required: true
        httpGet:
          required: true

      readiness:
        required: true

  metadata:
    labels:
      required:
        - app
